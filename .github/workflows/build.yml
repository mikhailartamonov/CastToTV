name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed --name CastToTV cast_to_tv.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CastToTV-windows
          path: dist/CastToTV.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CastToTV.exe
          generate_release_notes: true
